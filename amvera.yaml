meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  commands:
    - npm install --legacy-peer-deps
    - npm run build
  artifacts:
    - dist
    - node_modules
    - package.json
    - tsconfig.json
    - server.ts
    - logo.png
    - db.json

run:
  command: npm start
